name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag. Leave blank to use package.json version."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  check:
    name: Lint, typecheck, test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  package:
    name: Package ${{ matrix.name }}
    needs: check
    if: github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (arm64)
            os: macos-14
            platform: mac
            build_cmd: bun run dist:mac
          - name: Linux x86_64
            os: ubuntu-latest
            platform: linux-x64
            build_cmd: bun run build && bunx electron-builder --linux deb --x64 --publish never
          - name: Linux arm64
            os: ubuntu-24.04-arm
            platform: linux-arm64
            build_cmd: bun run build && bunx electron-builder --linux deb --arm64 --publish never

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install native fpm (Linux arm64)
        if: matrix.os == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ruby ruby-dev build-essential fakeroot
          sudo gem install --no-document fpm

      - name: Build artifacts
        run: ${{ matrix.build_cmd }}
        env:
          USE_SYSTEM_FPM: ${{ matrix.os == 'ubuntu-24.04-arm' && 'true' || '' }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.deb
          if-no-files-found: error

  release:
    name: Tag and Publish Release
    needs: package
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          input_tag='${{ inputs.tag }}'
          if [ -n "$input_tag" ]; then
            tag="$input_tag"
          else
            version=$(node -p "require('./package.json').version")
            tag="v$version"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create tag
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1 || git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists. Provide a new tag or bump package.json version."
            exit 1
          fi
          git tag "$TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$TAG"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --target "$GITHUB_SHA" \
            --generate-notes \
            artifacts/*.dmg artifacts/*.zip artifacts/*.deb
